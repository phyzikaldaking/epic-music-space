<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">Stellar Drift cover art</title>
  <desc id="desc">A deep space cover with cyan orbital rings and violet light.</desc>
  <defs>
    <radialGradient id="bg" cx="68%" cy="28%" r="72%">
      <stop offset="0" stop-color="#66faff"/>
      <stop offset=".32" stop-color="#6c5ce7"/>
      <stop offset="1" stop-color="#05060a"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" x2="1">
      <stop offset="0" stop-color="#33f8ff"/>
      <stop offset="1" stop-color="#ffd700"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <g fill="none" stroke="url(#ring)" stroke-linecap="round" opacity=".82">
    <ellipse cx="410" cy="410" rx="310" ry="118" stroke-width="8" transform="rotate(-24 410 410)"/>
    <ellipse cx="410" cy="410" rx="220" ry="82" stroke-width="4" transform="rotate(-24 410 410)"/>
  </g>
  <circle cx="410" cy="410" r="78" fill="#f5f5f7"/>
  <circle cx="468" cy="280" r="8" fill="#ffd700"/>
  <circle cx="208" cy="536" r="5" fill="#66faff"/>
  <circle cx="642" cy="522" r="4" fill="#f5f5f7"/>
  <text x="56" y="692" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800">Stellar Drift</text>
  <text x="58" y="736" fill="rgba(255,255,255,.72)" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="6">EMS DEMO CUE</text>
</svg>
